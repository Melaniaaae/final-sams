<app-global-spinner />

<div class="shell">

  <!-- ── Sidebar ──────────────────────────────────────────────────── -->
  <aside class="sidebar" [class.open]="isMenuOpen">

    <div class="logo">
      <div class="logo-title">Student Attachment<br>Management</div>
      <div class="logo-sub">SAMS Platform</div>
    </div>

    <div class="portal-chip" [class.coord]="isCoordinator">
      <span class="portal-dot"></span>
      {{ portalLabel }}
    </div>

    <nav class="nav">
  <a
    *ngFor="let item of navItems; trackBy: trackByRoute"
    [routerLink]="item.route"
    routerLinkActive="active"
    class="nav-item"
    (click)="closeMenu()"
  >
    <span class="nav-icon" [innerHTML]="item.svgPath"></span>
    {{ item.label }}
  </a>
</nav>

    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="avatar" [class.coord-avatar]="isCoordinator">
          {{ initials }}
        </div>
        <div class="user-info">
          <div class="user-name">{{ userName }}</div>
          <div class="user-reg">{{ userSub }}</div>
        </div>
      </div>

      <button class="logout-btn" (click)="confirmLogout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign out
      </button>
    </div>
  </aside>

  <!-- Mobile overlay -->
  <div
    class="sidebar-overlay"
    *ngIf="isMenuOpen"
    (click)="closeMenu()"
  ></div>

  <!-- ── Main ─────────────────────────────────────────────────────── -->
  <main class="main">

    <header class="topbar">
      <button class="menu-btn" (click)="toggleMenu()" aria-label="Open menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="#4a6e5a" stroke-width="2">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <div class="topbar-title">{{ pageTitle }}</div>

      <div class="topbar-badge" [class.coord]="isCoordinator">
        {{ isCoordinator ? 'Coordinator Portal' : 'Student Portal' }}
      </div>
    </header>

    <div class="page-content">
      <router-outlet />
    </div>
  </main>

</div>

<!-- ── Logout dialog ──────────────────────────────────────────────── -->
<div class="dialog-overlay" *ngIf="showLogoutDialog" (click)="cancelLogout()">
  <div class="dialog" (click)="$event.stopPropagation()">
    <div class="dialog-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
           stroke="#0A231C" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </div>
    <h3 class="dialog-title">Sign out?</h3>
    <p class="dialog-sub">You will be returned to the login page.</p>
    <div class="dialog-actions">
      <button class="dialog-cancel"  (click)="cancelLogout()">Cancel</button>
      <button class="dialog-confirm" (click)="logout()">Yes, sign out</button>
    </div>
  </div>
</div>
