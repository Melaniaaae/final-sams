<div class="students-page">

  <div class="page-header">
    <div>
      <h2 class="page-title">Student Management</h2>
      <p class="page-sub">{{ total() }} students in the 2025 cohort</p>
    </div>
    <button class="btn-primary">+ Add Student</button>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4a6e5a" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="text"
        placeholder="Search by name or reg. number…"
        [ngModel]="searchQuery()"
        (ngModelChange)="onSearch($event)"
      />
    </div>

    <div class="filter-chips">
      <button
        class="chip"
        [class.active]="statusFilter() === ''"
        (click)="onStatusFilter('')"
      >All</button>
      <button
        class="chip"
        [class.active]="statusFilter() === 'active'"
        (click)="onStatusFilter('active')"
      >Active</button>
      <button
        class="chip"
        [class.active]="statusFilter() === 'pending'"
        (click)="onStatusFilter('pending')"
      >Pending</button>
      <button
        class="chip"
        [class.active]="statusFilter() === 'completed'"
        (click)="onStatusFilter('completed')"
      >Completed</button>
    </div>
  </div>

  <!-- Table -->
  <div class="card">
    <div *ngIf="isLoading()" class="loading-rows">
      <div class="skeleton-row" *ngFor="let i of [1,2,3,4,5]"></div>
    </div>

    <table *ngIf="!isLoading()">
      <thead>
        <tr>
          <th>Student</th>
          <th>Reg. No.</th>
          <th>Company</th>
          <th>Supervisor</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let s of filteredStudents(); trackBy: trackById">
          <td>
            <div class="student-cell">
              <div class="avatar">{{ s.name | slice:0:1 }}</div>
              <div>
                <div class="student-name">{{ s.name }}</div>
                <div class="student-email">{{ s.email }}</div>
              </div>
            </div>
          </td>
          <td class="muted">{{ s.registrationNumber }}</td>
          <td>{{ $any(s).company || '—' }}</td>
          <td>{{ s.universitySupervisorName || 'Not assigned' }}</td>
          <td>
            <app-status-badge [status]="getStatusVariant(s.status ?? 'pending')" />
          </td>
          <td>
            <button class="row-action">View</button>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- Empty state -->
    <div class="empty-state" *ngIf="!isLoading() && filteredStudents().length === 0">
      <p>No students match your search.</p>
    </div>
  </div>

</div>
